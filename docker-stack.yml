version: "3.8"

services:
  client:
    image: ccr.ccs.tencentyun.com/tcb-100001011660-qtgo/jiuzhou-client:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - API_HOST=server:6011
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  server:
    image: ccr.ccs.tencentyun.com/tcb-100001011660-qtgo/jiuzhou-server:latest
    ports:
      - "6011:6011"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jiuzhou
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=6011
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - uploads:/app/server/uploads
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=jiuzhou
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    deploy:
      replicas: 1
      update_config:
        order: stop-first

volumes:
  postgres_data:
    external: true
    name: jiuzhou_postgres_data
  redis_data:
    external: true
    name: jiuzhou_redis_data
  uploads:
    external: true
    name: jiuzhou_uploads
  caddy_data:
    external: true
    name: jiuzhou_caddy_data
  caddy_config:
    external: true
    name: jiuzhou_caddy_config
