version: "3.8"

services:
  client:
    image: ccr.ccs.tencentyun.com/tcb-100001011660-qtgo/jiuzhou-client:latest
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
      - target: 19001
        published: 19001
        protocol: tcp
        mode: host
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - API_HOST=server:6011
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jiuzhou_net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  server:
    image: ccr.ccs.tencentyun.com/tcb-100001011660-qtgo/jiuzhou-server:latest
    ports:
      - "6011:6011"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=jiuzhou
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=6011
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - IDLE_WORKER_COUNT=${IDLE_WORKER_COUNT:-12}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
      - COS_BUCKET=${COS_BUCKET}
      - COS_REGION=${COS_REGION:-ap-guangzhou}
      - COS_AVATAR_PREFIX=${COS_AVATAR_PREFIX:-avatars/}
      - COS_DOMAIN=${COS_DOMAIN}
    volumes:
      - uploads:/app/server/uploads
    networks:
      - jiuzhou_net
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -q http://localhost:6011/api/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s

  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_preload_libraries=pg_stat_statements,auto_explain
      - -c
      - pg_stat_statements.track=all
      - -c
      - auto_explain.log_min_duration=200ms
      - -c
      - auto_explain.log_analyze=on
      - -c
      - auto_explain.log_buffers=on
      - -c
      - auto_explain.log_timing=on
      - -c
      - auto_explain.log_nested_statements=off
      - -c
      - log_min_duration_statement=200ms
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=1s
    environment:
      - POSTGRES_DB=jiuzhou
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jiuzhou_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        order: stop-first
      placement:
        constraints:
          - node.role == manager

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - jiuzhou_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/jiuzhou?sslmode=disable
      - PG_EXPORTER_AUTO_DISCOVER_DATABASES=false
    networks:
      - jiuzhou_net
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    volumes:
      - prometheus_data:/prometheus
    networks:
      - jiuzhou_net
    deploy:
      replicas: 1
      update_config:
        order: stop-first

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    configs:
      - source: grafana_datasource_config
        target: /etc/grafana/provisioning/datasources/prometheus.yml
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - jiuzhou_net
    deploy:
      replicas: 1
      update_config:
        order: stop-first

volumes:
  postgres_data:
    external: true
    name: jiuzhou_postgres_data
  redis_data:
    external: true
    name: jiuzhou_redis_data
  uploads:
    external: true
    name: jiuzhou_uploads
  caddy_data:
    external: true
    name: jiuzhou_caddy_data
  caddy_config:
    external: true
    name: jiuzhou_caddy_config
  prometheus_data:
  grafana_data:

configs:
  prometheus_config:
    file: ./ops/monitoring/prometheus.yml
  grafana_datasource_config:
    file: ./ops/monitoring/grafana-datasource.yml

networks:
  jiuzhou_net:
    driver: overlay
